<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
  }
  .mono { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }

  /* ---- canvas (desktop backdrop) ---- */
  .canvas { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  body.dark  .canvas { background: radial-gradient(120% 120% at 20% 0%, #34303c 0%, #211f27 55%, #16151b 100%); }
  body.light .canvas { background: radial-gradient(120% 120% at 20% 0%, #f4f5f9 0%, #e8eaf1 55%, #dfe2ea 100%); }

  /* ---- panel ---- */
  .panel {
    width: 480px; border-radius: 14px; padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }
  body.dark  .panel { background: rgba(30,30,34,0.94);   border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 24px 60px rgba(0,0,0,0.45); }
  body.light .panel { background: rgba(252,252,254,0.97); border: 1px solid rgba(0,0,0,0.07);    box-shadow: 0 24px 60px rgba(40,45,70,0.18); }

  body.dark  { --fg: rgba(255,255,255,0.92); --fg2: rgba(235,235,245,0.58); --fg3: rgba(235,235,245,0.32); --hair: rgba(255,255,255,0.10); --track: rgba(235,235,245,0.16); }
  body.light { --fg: rgba(0,0,0,0.88);       --fg2: rgba(60,60,67,0.60);    --fg3: rgba(60,60,67,0.32);    --hair: rgba(0,0,0,0.09);        --track: rgba(60,60,67,0.16); }

  .row { display: flex; align-items: center; }
  .hair { height: 1px; background: var(--hair); }
  .green { color: #76B900; }
  .fg { color: var(--fg); } .fg2 { color: var(--fg2); } .fg3 { color: var(--fg3); }

  .head .title { font-size: 15px; font-weight: 700; color: var(--fg); margin-left: 7px; }
  .head .spacer { flex: 1; }
  .icn { width: 16px; height: 16px; }

  .host-head { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .host-name { font-size: 13px; font-weight: 700; color: var(--fg); }
  .host-meta { font-size: 11px; color: var(--fg2); }
  .host-time { font-size: 10px; color: var(--fg2); margin-left: auto; }

  .thead, .grow {
    display: grid; grid-template-columns: 60px 170px 105px 48px; column-gap: 18px;
    align-items: center; padding: 0 6px;
  }
  .thead { font-size: 10px; color: var(--fg3); margin-bottom: 2px; }
  .grow { padding: 5px 6px; border-radius: 6px; }
  .grow + .grow { margin-top: 0; }

  .gpu-label { display: flex; align-items: center; gap: 6px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; }
  .gpu-label .t { font-size: 13px; font-weight: 700; color: var(--fg); }

  .cell { display: flex; align-items: center; gap: 7px; }
  .bar { width: 64px; height: 6px; border-radius: 3px; background: var(--track); overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 3px; }
  .pct { width: 34px; text-align: right; font-size: 11px; font-weight: 700; }
  .gib { width: 58px; font-size: 10px; color: var(--fg2); }
  .temp { font-size: 13px; }

  .foot { display: flex; align-items: center; font-size: 12px; color: var(--fg2); }
  .foot .spacer { flex: 1; }
  .foot b { font-weight: 500; }

  /* ---- process popover ---- */
  .pop { width: 330px; border-radius: 12px; overflow: hidden; }
  body.dark  .pop { background: rgba(38,38,43,0.98);  border: 1px solid rgba(255,255,255,0.09); box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  body.light .pop { background: rgba(252,252,254,0.99); border: 1px solid rgba(0,0,0,0.08);     box-shadow: 0 24px 60px rgba(40,45,70,0.2); }
  .pop-head { display: flex; align-items: center; gap: 6px; padding: 10px 14px; }
  .pop-head .g { font-size: 13px; font-weight: 700; color: var(--fg); }
  .pop-head .m { font-size: 11px; color: var(--fg2); }
  .pop-head .c { margin-left: auto; font-size: 10px; color: var(--fg2); }
  .prow { display: flex; align-items: center; gap: 11px; padding: 9px 14px; }
  .prow + .prow { border-top: 1px solid var(--hair); }
  .ava { width: 30px; height: 30px; border-radius: 50%; background: rgba(118,185,0,0.16); color: #76B900; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .pinfo { display: flex; flex-direction: column; gap: 4px; }
  .pinfo .l { display: flex; align-items: center; gap: 6px; }
  .pinfo .u { font-size: 11px; font-weight: 700; color: var(--fg); }
  .pinfo .n { font-size: 11px; color: var(--fg2); }
  .pinfo .b { width: 160px; height: 4px; border-radius: 2px; background: var(--track); overflow: hidden; }
  .pinfo .b > i { display: block; height: 100%; background: #76B900; }
  .pright { margin-left: auto; text-align: right; display: flex; flex-direction: column; gap: 3px; }
  .pright .mem { font-size: 11px; font-weight: 700; color: var(--fg); }
  .pright .pid { font-size: 10px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="canvas"><div id="root"></div></div>
<script>
// ---- Theme color (ported from Theme.swift) ----
function hsv2rgb(h,s,v){let i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s),r,g,b;
  switch(((i%6)+6)%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;default:r=v;g=p;b=q;}
  return `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;}
const G=[0.227,1.00,0.725],Y=[0.120,0.97,0.949],R=[0.012,0.80,0.886];
const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
function intensity(v,light,heavy){let t=Math.min(1,Math.max(0,(v-light)/(heavy-light)));let h=t<0.5?lerp(G,Y,t/0.5):lerp(Y,R,(t-0.5)/0.5);return hsv2rgb(h[0],h[1],h[2]);}
const utilC=v=>intensity(v,60,85), memC=v=>intensity(v,60,85), tempC=v=>intensity(v,65,82);

const chip = c => `<svg class="icn" viewBox="0 0 24 24" fill="none"><rect x="5.5" y="5.5" width="13" height="13" rx="3" stroke="${c}" stroke-width="1.6"/><path d="M8.5 13.5l2-2.5 1.7 2.2 1.3-1.7 1.9 2.5" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><g stroke="${c}" stroke-width="1.4" stroke-linecap="round"><path d="M9 5.5V3.5M12 5.5V3.5M15 5.5V3.5M9 20.5v-2M12 20.5v-2M15 20.5v-2M5.5 9H3.5M5.5 12H3.5M5.5 15H3.5M20.5 9h-2M20.5 12h-2M20.5 15h-2"/></g></svg>`;
const rack = c => `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="6.5" rx="1.6" stroke="${c}" stroke-width="1.6"/><rect x="3" y="13.5" width="18" height="6.5" rx="1.6" stroke="${c}" stroke-width="1.6"/><circle cx="6.5" cy="7.25" r="0.9" fill="${c}"/><circle cx="6.5" cy="16.75" r="0.9" fill="${c}"/></svg>`;
const gear = c => `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="${c}" stroke-width="1.6"/><path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1M18.7 18.7l-2.1-2.1M7.4 7.4L5.3 5.3" stroke="${c}" stroke-width="1.6" stroke-linecap="round"/></svg>`;
const refresh = c => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 11a8 8 0 10-1.5 5.5M20 4v4h-4" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const wave = c => `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2.5" stroke="${c}" stroke-width="1.6"/><path d="M9 13l1.8-2.3 1.6 2 1.2-1.5 1.4 1.8" stroke="${c}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const memTxt = (u,t)=>`${u.toFixed(1)}/${Math.round(t)}G`;

function gpuRow(g){
  const memPct = Math.round(g.used/g.total*100);
  const mc = memC(memPct), uc = utilC(g.util), tc = tempC(g.temp);
  return `<div class="grow">
    <div class="gpu-label"><span class="dot" style="background:${g.busy?'#76B900':'rgba(150,150,150,0.45)'}"></span><span class="t mono">GPU ${g.i}</span></div>
    <div class="cell">
      <div class="bar"><i style="width:${Math.max(5,memPct)}%;background:${mc}"></i></div>
      <div class="pct mono" style="color:${mc}">${memPct}%</div>
      <div class="gib mono">${memTxt(g.used,g.total)}</div>
    </div>
    <div class="cell">
      <div class="bar"><i style="width:${Math.max(g.util>0?5:0,g.util)}%;background:${uc}"></i></div>
      <div class="pct mono" style="color:${uc}">${g.util}%</div>
    </div>
    <div class="temp mono" style="color:${tc}">${g.temp}°C</div>
  </div>`;
}
function host(h){
  return `<div>
    <div class="host-head">${rack('#76B900')}<span class="host-name">${h.name}</span>
      <span class="host-meta">· ${h.gpus.length}× ${h.model}</span><span class="host-time mono">${h.time}</span></div>
    <div class="thead"><div>GPU</div><div>显存</div><div>利用率</div><div>温度</div></div>
    <div class="hair" style="margin:0 6px 4px"></div>
    ${h.gpus.map(gpuRow).join('')}
  </div>`;
}
function panel(hosts){
  const fg2 = getComputedStyle(document.body).getPropertyValue('--fg2');
  return `<div class="panel">
    <div class="row head">${chip('#76B900')}<span class="title">GPU 状态</span><span class="spacer"></span>${refresh(fg2)}</div>
    <div class="hair"></div>
    <div style="display:flex;flex-direction:column;gap:18px">${hosts.map(host).join('')}</div>
    <div class="hair"></div>
    <div class="foot">${gear(fg2)}<b style="margin-left:6px">设置</b><span class="spacer"></span><b>退出</b></div>
  </div>`;
}
function popover(){
  const fg2 = getComputedStyle(document.body).getPropertyValue('--fg2');
  const procs=[
    {u:'alice', n:'python train.py', mem:'18.2 GiB', frac:0.94, pid:21847},
    {u:'bob',   n:'python',          mem:'12.6 GiB', frac:0.65, pid:33102},
    {u:'carol', n:'ollama',          mem:'6.1 GiB',  frac:0.31, pid:9921},
  ];
  return `<div class="pop">
    <div class="pop-head">${wave('#76B900')}<span class="g mono">GPU 0</span><span class="m">A100-SXM4-40GB</span><span class="c">3 个进程</span></div>
    <div class="hair"></div>
    ${procs.map(p=>`<div class="prow">
      <div class="ava">${p.u.slice(0,2).toUpperCase()}</div>
      <div class="pinfo"><div class="l"><span class="u">${p.u}</span><span class="n">${p.n}</span></div>
        <div class="b"><i style="width:${p.frac*100}%"></i></div></div>
      <div class="pright"><span class="mem mono">${p.mem}</span><span class="pid mono">pid ${p.pid}</span></div>
    </div>`).join('')}
  </div>`;
}

const data=[
  {name:'dgx-a100', model:'A100-SXM4-40GB', time:'23:42:07', gpus:[
    {i:0,util:96,used:38.4,total:40,temp:71,busy:true},
    {i:1,util:88,used:36.1,total:40,temp:68,busy:true},
    {i:2,util:12,used:2.1, total:40,temp:41,busy:true},
    {i:3,util:0, used:0.0, total:40,temp:33,busy:false},
  ]},
  {name:'lab-4090', model:'RTX 4090', time:'23:42:06', gpus:[
    {i:0,util:64,used:18.9,total:24,temp:61,busy:true},
    {i:1,util:45,used:11.2,total:24,temp:55,busy:true},
  ]},
];

const scene = new URLSearchParams(location.search).get('scene') || 'dark';
document.body.className = scene === 'light' ? 'light' : 'dark';
document.getElementById('root').innerHTML = scene === 'proc' ? popover() : panel(data);
</script>
</body>
</html>
